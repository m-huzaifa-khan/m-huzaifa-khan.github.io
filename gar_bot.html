<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base target="_blank"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeSS for Group Accounting & Reporting</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff; /* white background */
      font-family: Arial, Helvetica, sans-serif;
      height: 95vh;
      overflow: hidden;
    }

    .top-logo {
      width: 100%;
      display: flex;
      justify-content: center;   /* center horizontally */
      padding-top: 80px;         /* move logo lower from top */
      margin-bottom: 20px;
    }

    .top-logo img {
      width: 200px;              /* adjust size if needed */
      height: auto;
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    .headline {
      font-size: 3rem;
      font-weight: 700;
      color: #0b0b46; /* dark blue */
    }

    .description {
      max-width: 700px;
      font-size: 1.3rem;
      line-height: 1.6;
      color: #000000; /* black text */
      margin-top: 20px;
    }

    .description ul {
      margin: 15px 0;
      padding-left: 20px;
    }

    .description li {
      margin-bottom: 6px;
    }

    .bottom-text {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      color: #0b0b46; /* dark blue */
      margin-bottom: 70px;
    }

    .arrow {
      font-size: 1.5rem;
    }

    @media (max-width: 768px) {
      .headline {
        font-size: 2.5rem;
      }
      .bottom-text {
        font-size: 1rem;
        margin-bottom: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top logo -->
    <div class="top-logo">
      <img src="TeSS_Taskbot.png" alt="GAR Logo">
    </div>
    <div class="description">
        <p>
          <strong>TeSS for Group Accounting & Reporting Bot</strong> is an AI-powered assistant that empowers teams to enhance efficiency, accuracy and decision-making in accounting and reporting processes.
        </p>

        
      </div>
    <div class="bottom-text">
      Press the blue icon <span class="arrow">➡️</span>
    </div>
  </div>

</html>
